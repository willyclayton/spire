<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spire · Geolocation Review Queue</title>
    <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #141b2d; color: #f4f6fb; }
      header { padding: 10px 16px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #2a3350; }
      header b { color: #c9a227; }
      .wrap { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 52px); }
      #map { height: 100%; }
      .panel { padding: 16px; overflow: auto; }
      img { max-width: 100%; border-radius: 8px; background: #000; }
      .meta { font-size: 13px; color: #8a93a6; margin: 8px 0; line-height: 1.5; }
      .meta b { color: #f4f6fb; font-weight: 600; }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      button { flex: 1; padding: 12px; border: 0; border-radius: 999px; font-weight: 700; cursor: pointer; }
      .approve { background: #2e7d32; color: #fff; }
      .reject { background: #b23a2a; color: #fff; }
      .skip { background: #2a3350; color: #f4f6fb; }
      .count { margin-left: auto; font-size: 13px; color: #8a93a6; }
      .export { background: #c9a227; color: #141b2d; }
      .conf { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #2a3350; }
    </style>
  </head>
  <body>
    <header>
      <b>SPIRE</b> Geolocation Review Queue
      <span class="count" id="count"></span>
      <button class="export" style="flex:0 0 auto;padding:8px 16px" onclick="exportApproved()">Export approved</button>
    </header>
    <div class="wrap">
      <div id="map"></div>
      <div class="panel" id="panel">Loading review-queue.json…</div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
    <script>
      // Human review as an approval queue, not per-photo research (spec §6.4.4).
      // Consumes scripts/cache/review-queue.json produced by enrich-geolocate.ts.
      let items = [], i = 0, decisions = {};
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron',
        center: [-87.63, 41.88],
        zoom: 12,
      });
      let marker = new maplibregl.Marker({ draggable: true, color: '#c9a227' });

      async function load() {
        try {
          const res = await fetch('../cache/review-queue.json');
          items = await res.json();
        } catch (e) {
          document.getElementById('panel').textContent = 'No review-queue.json yet — run tm:enrich first.';
          return;
        }
        decisions = JSON.parse(localStorage.getItem('spire.review') || '{}');
        render();
      }

      function render() {
        const el = document.getElementById('panel');
        document.getElementById('count').textContent =
          `${i + 1}/${items.length} · ${Object.values(decisions).filter(d => d.status==='approve').length} approved`;
        const it = items[i];
        if (!it) { el.innerHTML = '<h2>Queue complete.</h2>'; return; }
        map.setCenter([it.lon, it.lat]);
        marker.setLngLat([it.lon, it.lat]).addTo(map);
        el.innerHTML = `
          <img src="${it.imageUrl}" alt="" />
          <div class="meta">
            <b>${it.caption || it.id}</b><br/>
            Era ${it.era} · ${it.source} · ${it.license}<br/>
            <span class="conf">confidence ${it.confidence ?? '?'}</span>
            ${it.compassAngle != null ? ` · bearing ${Math.round(it.compassAngle)}°` : ''}<br/>
            ${it.reasoning ? `<i>${it.reasoning}</i>` : ''}
          </div>
          <div class="row">
            <button class="reject" onclick="decide('reject')">Reject</button>
            <button class="skip" onclick="next()">Skip</button>
            <button class="approve" onclick="decide('approve')">Approve</button>
          </div>`;
      }

      function decide(status) {
        const it = items[i];
        const ll = marker.getLngLat();
        decisions[it.id] = { status, lat: ll.lat, lon: ll.lng }; // nudged position wins
        localStorage.setItem('spire.review', JSON.stringify(decisions));
        next();
      }
      function next() { i = Math.min(i + 1, items.length); render(); }

      function exportApproved() {
        const approved = items
          .filter(it => decisions[it.id]?.status === 'approve')
          .map(it => ({ ...it, lat: decisions[it.id].lat, lon: decisions[it.id].lon }));
        const blob = new Blob([JSON.stringify(approved, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'loc-enriched.json';
        a.click();
      }

      load();
    </script>
  </body>
</html>
